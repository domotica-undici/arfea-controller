services:
  arfea-controller:
    build: .
    image: arfea-controller:latest
    container_name: arfea-controller
    restart: unless-stopped
    pid: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN     # necessario per nsenter (self-update + reboot host)
    security_opt:
      # Su host con AppArmor (Ubuntu/Debian desktop) il profilo docker-default
      # blocca la reassociate ai namespace dell'host ("nsenter: Operation not
      # permitted") anche con CAP_SYS_ADMIN → si romperebbero reboot, self-update
      # OTA e import UI. Disattivarlo per QUESTO container ripristina nsenter.
      # No-op sugli host senza AppArmor. (seccomp non c'entra: verificato.)
      - apparmor:unconfined
    ports:
      - "8888:8888"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/docker_store:/opt/docker_store
      - /opt/docker_store/arfea-controller/config:/data
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      TZ: Europe/Rome
      CONFIG_PATH: /data/arfea.yml
    logging:
      options:
        max-size: 10m
