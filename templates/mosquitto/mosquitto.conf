# Config minima del broker MQTT ARFEA.
# Installata dal controller alla creazione del container, solo se assente
# (una config esistente non viene mai sovrascritta): vedi _ensure_default_config
# in arfea-controller/app/docker_manager.py.
#
# Il broker e' raggiungibile solo dalla rete Docker interna e dalla LAN: la porta
# 1883 non e' esposta su internet. I client sono zwave-js-ui, zigbee2mqtt e il
# binding MQTT di OpenHAB, tutti sulla stessa centralina.

allow_anonymous true
listener 1883 0.0.0.0
